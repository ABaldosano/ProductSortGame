<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Product Sort Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at top, #0f1b30 0%, #060e1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
      touch-action: none;
    }

    /* ── Wrapper (scaled by JS on small screens) ── */
    #game-wrapper {
      width: 450px;
      flex-shrink: 0;
      transform-origin: top center;
    }

    /* ── Main container ── */
    #game-container {
      width: 450px;
      height: 640px;
      position: relative;
      background: linear-gradient(175deg, #b8e8fd 0%, #cdf5e8 55%, #a2dcb0 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.55),
        0 0 0 1.5px rgba(255,255,255,0.12),
        inset 0 1px 0 rgba(255,255,255,0.35);
      margin: 20px auto;
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      display: none; /* shown only during game */
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      z-index: 5;
    }

    #hud.visible { display: flex; }

    #hearts-display {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .heart-icon {
      width: 18px;
      height: 18px;
    }

    #score-display {
      font-size: 14px;
      font-weight: 700;
      color: #1a237e;
      letter-spacing: 0.3px;
    }

    #btn-pause {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 10px;
      background: rgba(90, 90, 200, 0.12);
      color: #3c3c8c;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.15s;
    }
    #btn-pause:active { background: rgba(90,90,200,0.25); }

    /* ── Game area (field) ── */
    #game-area {
      position: absolute;
      top: 56px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    /* ── Basket area ── */
    #basket-area {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(180deg, transparent 0%, rgba(120, 75, 30, 0.10) 100%);
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      padding: 0 12px 10px;
    }

    .basket-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 120px;
      cursor: default;
    }

    .basket-zone img {
      width: 84px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(80,40,0,0.25));
      pointer-events: none;
      user-select: none;
    }

    .basket-label {
      font-size: 11px;
      font-weight: 700;
      color: #4a3020;
      background: rgba(255,255,255,0.72);
      padding: 2px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ── Products ── */
    .product {
      position: absolute;
      width: 48px;
      height: 48px;
      object-fit: contain;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.22));
      transition: filter 0.12s;
      will-change: transform, top, left;
    }

    .product.is-dragging {
      cursor: grabbing;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.38));
      z-index: 99 !important;
    }

    /* ── OVERLAY SCREENS ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 20;
    }

    /* Menu */
    #screen-menu {
      background: linear-gradient(175deg, #b8e8fd 0%, #cdf5e8 55%, #a2dcb0 100%);
    }

    .menu-logo {
      font-size: 48px;
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
    }

    .menu-title {
      font-size: 26px;
      font-weight: 800;
      color: #1a237e;
      text-align: center;
      line-height: 1.2;
      text-shadow: 0 2px 4px rgba(255,255,255,0.6);
    }

    .menu-sub {
      font-size: 12px;
      font-weight: 600;
      color: #546060;
      text-align: center;
      padding: 0 40px;
      line-height: 1.6;
    }

    #menu-highscore {
      font-size: 13px;
      font-weight: 700;
      color: #b5442a;
      background: rgba(255,255,255,0.65);
      padding: 5px 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .spacer-sm { height: 6px; }

    .action-btn {
      width: 200px;
      padding: 14px 0;
      border: none;
      border-radius: 14px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    .action-btn:active { transform: scale(0.96); }

    .btn-green {
      background: linear-gradient(135deg, #43a047, #2e7d32);
      color: #fff;
      box-shadow: 0 5px 16px rgba(67,160,71,0.38);
    }

    .btn-blue {
      background: linear-gradient(135deg, #1e88e5, #1565c0);
      color: #fff;
      box-shadow: 0 5px 16px rgba(30,136,229,0.35);
    }

    .btn-outline {
      background: rgba(255,255,255,0.55);
      color: #1a237e;
      border: 1.5px solid rgba(100,100,200,0.3);
      font-size: 13px;
    }

    /* Pause / Gameover overlays */
    #screen-pause,
    #screen-gameover {
      background: rgba(8, 18, 40, 0.80);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #screen-pause.hidden,
    #screen-gameover.hidden,
    #screen-menu.hidden { display: none; }

    .overlay-heading {
      font-size: 34px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .overlay-stat {
      font-size: 16px;
      font-weight: 600;
      color: #90caf9;
    }

    .overlay-stat.highlight {
      font-size: 14px;
      color: #ffd54f;
    }

    /* ── Feedback float label ── */
    .feedback-label {
      position: absolute;
      font-size: 20px;
      font-weight: 800;
      pointer-events: none;
      z-index: 50;
      text-shadow: 0 2px 6px rgba(0,0,0,0.28);
      animation: floatUp 0.75s ease-out forwards;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-55px) scale(1.25); }
    }

    /* ── Speed up flash ── */
    @keyframes speedFlash {
      0%, 100% { filter: brightness(1); }
      40%       { filter: brightness(1.18); }
    }
    .flash-speed { animation: speedFlash 0.45s ease; }

    /* ── Basket glow on drop ── */
    @keyframes basketGlow {
      0%, 100% { filter: drop-shadow(0 4px 8px rgba(80,40,0,0.25)); }
      50%       { filter: drop-shadow(0 0 18px rgba(76,175,80,0.85)); }
    }
    .basket-correct { animation: basketGlow 0.4s ease; }

    @keyframes basketGlowRed {
      0%, 100% { filter: drop-shadow(0 4px 8px rgba(80,40,0,0.25)); }
      50%       { filter: drop-shadow(0 0 18px rgba(229,57,53,0.85)); }
    }
    .basket-wrong { animation: basketGlowRed 0.4s ease; }
  </style>
</head>

<body>
<div id="game-wrapper">
  <div id="game-container">

    <!-- HUD (visible only during gameplay) -->
    <div id="hud">
      <div id="hearts-display" aria-label="Hearts remaining"></div>
      <div id="score-display">Score: 0</div>
      <button id="btn-pause" aria-label="Pause">⏸</button>
    </div>

    <!-- Game field -->
    <div id="game-area">
      <div id="basket-area">
        <div class="basket-zone" id="basket-Fruit" data-category="Fruit">
          <img src="images/basket.png" alt="Fruit basket" />
          <span class="basket-label">Fruit</span>
        </div>
        <div class="basket-zone" id="basket-Vegetable" data-category="Vegetable">
          <img src="images/basket.png" alt="Vegetable basket" />
          <span class="basket-label">Vegetable</span>
        </div>
        <div class="basket-zone" id="basket-Dairy" data-category="Dairy">
          <img src="images/basket.png" alt="Dairy basket" />
          <span class="basket-label">Dairy</span>
        </div>
      </div>
    </div>

    <!-- MENU SCREEN -->
    <div class="overlay" id="screen-menu">
      <div class="menu-logo">🛒</div>
      <div class="menu-title">Product Sort<br>Simulator</div>
      <div class="menu-sub">Drag items to the correct basket.<br>Don't let them fall!</div>
      <div id="menu-highscore">Best: 0</div>
      <div class="spacer-sm"></div>
      <button class="action-btn btn-green" id="btn-start">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Start Game
      </button>
      <a class="action-btn btn-outline" href="https://abaldosado.github.io/My_Portfolio" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        My Portfolio
      </a>
    </div>

    <!-- PAUSE SCREEN -->
    <div class="overlay hidden" id="screen-pause">
      <div class="overlay-heading">⏸ Paused</div>
      <div class="spacer-sm"></div>
      <button class="action-btn btn-green" id="btn-resume">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Resume
      </button>
      <button class="action-btn btn-blue" id="btn-menu-pause">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Main Menu
      </button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="overlay hidden" id="screen-gameover">
      <div class="overlay-heading">Game Over</div>
      <div class="overlay-stat" id="gameover-score">Score: 0</div>
      <div class="overlay-stat highlight" id="gameover-best">Best: 0</div>
      <div class="spacer-sm"></div>
      <button class="action-btn btn-green" id="btn-restart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Play Again
      </button>
      <button class="action-btn btn-blue" id="btn-menu-gameover">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Main Menu
      </button>
    </div>

  </div>
</div>

<!-- Audio elements -->
<audio id="snd-bgm"      src="sounds/Bgmusic.wav"  loop  preload="auto"></audio>
<audio id="snd-click"    src="sounds/Click.wav"          preload="auto"></audio>
<audio id="snd-correct"  src="sounds/Correct.wav"        preload="auto"></audio>
<audio id="snd-wrong"    src="sounds/Wrong.wav"          preload="auto"></audio>
<audio id="snd-levelup"  src="sounds/Levelup.wav"        preload="auto"></audio>
<audio id="snd-gameover" src="sounds/Gameover.wav"       preload="auto"></audio>

<script>
/* =====================================================================
   PRODUCT SORT GAME — Web Port
   Original: C# WinForms (December 2025) by Arthur Baldosano
   Port    : Vanilla JS, single-file, mobile-touch-aware
   ===================================================================== */

// ── Constants ─────────────────────────────────────────────────────────
const GAME_W       = 450;
const GAME_H       = 640;
const HUD_H        = 56;
const FIELD_H      = GAME_H - HUD_H;   // 584 — actual play area height
const PRODUCT_SIZE = 48;
const BASE_FALL_PX = 100;              // px per second (original: 5px / 50ms)
const BASE_SPAWN   = 1500;             // ms between spawns
const COMBO_TARGET = 5;               // correct in a row for +1 heart
const MAX_HEARTS   = 10;
const SCORE_STEP   = 10;
const SPEED_EVERY  = 200;             // score milestone for speed increase
const SPEED_FACTOR = 0.95;            // interval multiplier (original value)
const MIN_SPAWN    = 400;

const PRODUCTS = [
  { name: 'Apple',    category: 'Fruit'      },
  { name: 'Banana',   category: 'Fruit'      },
  { name: 'Orange',   category: 'Fruit'      },
  { name: 'Grape',    category: 'Fruit'      },
  { name: 'Mango',    category: 'Fruit'      },
  { name: 'Carrot',   category: 'Vegetable'  },
  { name: 'Potato',   category: 'Vegetable'  },
  { name: 'Tomato',   category: 'Vegetable'  },
  { name: 'Broccoli', category: 'Vegetable'  },
  { name: 'Cucumber', category: 'Vegetable'  },
  { name: 'Milk',     category: 'Dairy'      },
  { name: 'Cheese',   category: 'Dairy'      },
  { name: 'Yogurt',   category: 'Dairy'      },
  { name: 'Butter',   category: 'Dairy'      },
  { name: 'Cream',    category: 'Dairy'      },
];

// ── DOM refs ──────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const gameWrapper   = $('game-wrapper');
const gameContainer = $('game-container');
const gameArea      = $('game-area');
const hud           = $('hud');
const heartsDisplay = $('hearts-display');
const scoreDisplay  = $('score-display');
const menuHighscore = $('menu-highscore');
const gameoverScore = $('gameover-score');
const gameoverBest  = $('gameover-best');

const screenMenu     = $('screen-menu');
const screenPause    = $('screen-pause');
const screenGameover = $('screen-gameover');

const baskets = [
  { el: $('basket-Fruit'),      category: 'Fruit'      },
  { el: $('basket-Vegetable'),  category: 'Vegetable'  },
  { el: $('basket-Dairy'),      category: 'Dairy'      },
];

const snd = {
  bgm:      $('snd-bgm'),
  click:    $('snd-click'),
  correct:  $('snd-correct'),
  wrong:    $('snd-wrong'),
  levelup:  $('snd-levelup'),
  gameover: $('snd-gameover'),
};

// ── State ─────────────────────────────────────────────────────────────
let fallingProducts = [];   // [{ el, category, x, y }]
let hearts          = 5;
let score           = 0;
let correctCombo    = 0;
let highScore       = parseInt(localStorage.getItem('psg_hs') || '0');
let isGameOver      = false;
let isPaused        = false;
let spawnIntervalMs = BASE_SPAWN;
let speedMult       = 1.0;
let lastMilestone   = 0;

let spawnTimerId  = null;
let animFrameId   = null;
let lastTimestamp = null;

// Drag state
let drag = null; // { fp, offX, offY }

// ── Sound helpers ─────────────────────────────────────────────────────
function play(el) {
  if (!el) return;
  el.currentTime = 0;
  el.play().catch(() => {});
}

function playBgm()  { snd.bgm.play().catch(() => {}); }
function stopBgm()  { snd.bgm.pause(); snd.bgm.currentTime = 0; }

// ── Responsive scaling ────────────────────────────────────────────────
function scaleGame() {
  const sw    = window.innerWidth;
  const sh    = window.innerHeight;
  const scale = Math.min(1, sw / (GAME_W + 16), sh / (GAME_H + 40));
  gameWrapper.style.transform = `scale(${scale})`;
  // Let body expand to show the scaled wrapper
  document.body.style.minHeight = (GAME_H * scale + 40) + 'px';
}
window.addEventListener('resize', scaleGame);
scaleGame();

// ── High score ────────────────────────────────────────────────────────
function saveHS() { localStorage.setItem('psg_hs', highScore); }

// ── Screen management ─────────────────────────────────────────────────
function showMenu() {
  screenMenu.classList.remove('hidden');
  screenPause.classList.add('hidden');
  screenGameover.classList.add('hidden');
  hud.classList.remove('visible');
}

function hideMenu() {
  screenMenu.classList.add('hidden');
  hud.classList.add('visible');
}

function showPause() {
  screenPause.classList.remove('hidden');
  screenGameover.classList.add('hidden');
}

function hidePause() {
  screenPause.classList.add('hidden');
}

function showGameover() {
  screenGameover.classList.remove('hidden');
  screenPause.classList.add('hidden');
}

// ── Game flow ─────────────────────────────────────────────────────────
function startGame() {
  isGameOver      = false;
  isPaused        = false;
  hearts          = 5;
  score           = 0;
  correctCombo    = 0;
  spawnIntervalMs = BASE_SPAWN;
  speedMult       = 1.0;
  lastMilestone   = 0;
  lastTimestamp   = null;
  drag            = null;

  clearProducts();
  hideMenu();
  hidePause();
  screenGameover.classList.add('hidden');

  updateHeartsUI();
  updateScoreUI();
  playBgm();
  startSpawn();
  animFrameId = requestAnimationFrame(gameLoop);
}

function pauseGame() {
  if (isGameOver || isPaused) return;
  isPaused = true;
  stopSpawn();
  cancelAnimationFrame(animFrameId);
  animFrameId = null;
  showPause();
}

function resumeGame() {
  if (!isPaused) return;
  isPaused      = false;
  lastTimestamp = null;
  hidePause();
  startSpawn();
  animFrameId = requestAnimationFrame(gameLoop);
}

function backToMenu() {
  stopSpawn();
  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = null;
  isGameOver  = false;
  isPaused    = false;
  drag        = null;
  clearProducts();
  menuHighscore.textContent = `Best: ${highScore}`;
  showMenu();
  playBgm();
}

function triggerGameOver() {
  if (isGameOver) return;
  isGameOver = true;
  stopSpawn();
  cancelAnimationFrame(animFrameId);
  animFrameId = null;
  drag = null;

  if (score > highScore) { highScore = score; saveHS(); }

  play(snd.gameover);
  stopBgm();

  gameoverScore.textContent = `Score: ${score}`;
  gameoverBest.textContent  = `Best: ${highScore}`;
  showGameover();
}

// ── Spawn timer ───────────────────────────────────────────────────────
function startSpawn() {
  stopSpawn();
  spawnTimerId = setInterval(spawnProduct, spawnIntervalMs);
}

function stopSpawn() {
  if (spawnTimerId) { clearInterval(spawnTimerId); spawnTimerId = null; }
}

function resetSpawn() {
  stopSpawn();
  if (!isGameOver && !isPaused) startSpawn();
}

// ── Game loop (rAF + delta time) ──────────────────────────────────────
function gameLoop(ts) {
  if (isPaused || isGameOver) return;

  if (lastTimestamp === null) lastTimestamp = ts;
  const delta = Math.min((ts - lastTimestamp) / 1000, 0.05); // cap at 50ms
  lastTimestamp = ts;

  const move = BASE_FALL_PX * speedMult * delta;

  for (let i = fallingProducts.length - 1; i >= 0; i--) {
    const fp = fallingProducts[i];
    if (drag && drag.fp === fp) continue; // don't move dragged item

    fp.y += move;
    fp.el.style.top = fp.y.toFixed(1) + 'px';

    if (fp.y > FIELD_H) {          // fell off the bottom
      removeProductAt(i);
      loseHeart();
      if (isGameOver) return;
    }
  }

  animFrameId = requestAnimationFrame(gameLoop);
}

// ── Spawn product ─────────────────────────────────────────────────────
function spawnProduct() {
  if (isGameOver || isPaused) return;

  const p  = PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)];
  const x  = Math.floor(Math.random() * (GAME_W - PRODUCT_SIZE - 20)) + 10;
  const y  = -PRODUCT_SIZE;

  const img       = document.createElement('img');
  img.src         = `images/${p.name}.png`;
  img.alt         = p.name;
  img.className   = 'product';
  img.draggable   = false;
  img.style.left  = x + 'px';
  img.style.top   = y + 'px';
  img.style.zIndex = (fallingProducts.length + 10).toString();

  const fp = { el: img, category: p.category, x, y };

  img.addEventListener('mousedown',  e => onDragStart(e, fp));
  img.addEventListener('touchstart', e => onDragStart(e, fp), { passive: false });

  gameArea.appendChild(img);
  fallingProducts.push(fp);
}

// ── Drag & drop ───────────────────────────────────────────────────────

/** Get pointer position in LOGICAL game-area coordinates */
function toGameCoords(clientX, clientY) {
  const rect   = gameArea.getBoundingClientRect();
  const scaleX = GAME_W  / rect.width;
  const scaleY = FIELD_H / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY,
  };
}

function getClient(e) {
  return e.touches
    ? { cx: e.touches[0].clientX, cy: e.touches[0].clientY }
    : { cx: e.clientX,            cy: e.clientY };
}

function onDragStart(e, fp) {
  e.preventDefault();
  e.stopPropagation();
  if (drag || isGameOver || isPaused) return;

  const { cx, cy } = getClient(e);
  const pos = toGameCoords(cx, cy);

  drag = { fp, offX: pos.x - fp.x, offY: pos.y - fp.y };
  fp.el.classList.add('is-dragging');
}

function onDragMove(e) {
  if (!drag) return;
  e.preventDefault();

  const { cx, cy } = getClient(e);
  const pos = toGameCoords(cx, cy);

  drag.fp.x = pos.x - drag.offX;
  drag.fp.y = pos.y - drag.offY;
  drag.fp.el.style.left = drag.fp.x.toFixed(1) + 'px';
  drag.fp.el.style.top  = drag.fp.y.toFixed(1) + 'px';
}

function onDragEnd(e) {
  if (!drag) return;
  e.preventDefault();

  const fp = drag.fp;
  fp.el.classList.remove('is-dragging');

  const productCX = fp.x + PRODUCT_SIZE / 2;
  const productCY = fp.y + PRODUCT_SIZE / 2;

  const gaRect = gameArea.getBoundingClientRect();
  const scaleX = GAME_W  / gaRect.width;
  const scaleY = FIELD_H / gaRect.height;

  let hit = false;
  for (const basket of baskets) {
    const br = basket.el.getBoundingClientRect();
    const bx = (br.left - gaRect.left) * scaleX;
    const by = (br.top  - gaRect.top)  * scaleY;
    const bw = br.width  * scaleX;
    const bh = br.height * scaleY;
    const pad = 16;

    if (
      productCX >= bx - pad && productCX <= bx + bw + pad &&
      productCY >= by - pad && productCY <= by + bh + pad
    ) {
      hit = true;
      const idx = fallingProducts.indexOf(fp);

      if (fp.category === basket.category) {
        // ✓ Correct sort
        if (idx !== -1) fallingProducts.splice(idx, 1);
        gameArea.removeChild(fp.el);
        score += SCORE_STEP;
        correctCombo++;
        if (correctCombo >= COMBO_TARGET) {
          hearts = Math.min(hearts + 1, MAX_HEARTS);
          correctCombo = 0;
        }
        updateScoreUI();
        updateHeartsUI();
        play(snd.correct);
        showFeedback('+10', productCX, productCY, '#2e7d32');
        flashBasket(basket.el, 'basket-correct');
        checkSpeed();
      } else {
        // ✗ Wrong sort — product resumes falling
        play(snd.wrong);
        correctCombo = 0;
        flashBasket(basket.el, 'basket-wrong');
        showFeedback('✗', productCX, productCY, '#c62828');
        loseHeart();
      }
      break;
    }
  }

  // Miss — product just keeps falling (already in fallingProducts)
  drag = null;
  if (isGameOver) return;
}

// ── UI helpers ────────────────────────────────────────────────────────
const HEART_SVG = `<svg class="heart-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <path fill="%COLOR%" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
</svg>`;

function updateHeartsUI() {
  let html = '';
  for (let i = 0; i < Math.min(hearts, MAX_HEARTS); i++) {
    html += HEART_SVG.replace('%COLOR%', '#e53935');
  }
  heartsDisplay.innerHTML = html;
  heartsDisplay.setAttribute('aria-label', `${hearts} hearts remaining`);
}

function updateScoreUI() {
  scoreDisplay.textContent = `Score: ${score}`;
}

function loseHeart() {
  hearts--;
  correctCombo = 0;
  updateHeartsUI();
  if (hearts <= 0) triggerGameOver();
}

function showFeedback(text, x, y, color) {
  const el       = document.createElement('div');
  el.className   = 'feedback-label';
  el.textContent = text;
  el.style.color = color;
  el.style.left  = (x - 16) + 'px';
  el.style.top   = (y - 16) + 'px';
  gameArea.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function flashBasket(el, cls) {
  el.classList.remove('basket-correct', 'basket-wrong');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
}

// ── Speed increase ────────────────────────────────────────────────────
function checkSpeed() {
  if (score === 0) return;
  const milestone = Math.floor(score / SPEED_EVERY);
  if (milestone > lastMilestone) {
    lastMilestone   = milestone;
    spawnIntervalMs = Math.max(MIN_SPAWN, Math.round(spawnIntervalMs * SPEED_FACTOR));
    speedMult      *= (1 / SPEED_FACTOR); // ~1.053×
    resetSpawn();
    play(snd.levelup);
    gameContainer.classList.add('flash-speed');
    gameContainer.addEventListener('animationend',
      () => gameContainer.classList.remove('flash-speed'), { once: true });
  }
}

// ── Product cleanup ───────────────────────────────────────────────────
function removeProductAt(i) {
  const fp = fallingProducts[i];
  if (fp.el.parentNode) fp.el.parentNode.removeChild(fp.el);
  fallingProducts.splice(i, 1);
}

function clearProducts() {
  fallingProducts.forEach(fp => {
    if (fp.el.parentNode) fp.el.parentNode.removeChild(fp.el);
  });
  fallingProducts = [];
  drag = null;
}

// ── Global event listeners ────────────────────────────────────────────
document.addEventListener('mousemove',  onDragMove);
document.addEventListener('mouseup',    onDragEnd);
document.addEventListener('touchmove',  onDragMove, { passive: false });
document.addEventListener('touchend',   onDragEnd,  { passive: false });
document.addEventListener('touchcancel',onDragEnd,  { passive: false });

$('btn-start').addEventListener('click', () => { play(snd.click); startGame(); });
$('btn-pause').addEventListener('click', () => { play(snd.click); pauseGame(); });
$('btn-resume').addEventListener('click', () => { play(snd.click); resumeGame(); });
$('btn-menu-pause').addEventListener('click', () => { play(snd.click); backToMenu(); });
$('btn-restart').addEventListener('click', () => { play(snd.click); startGame(); });
$('btn-menu-gameover').addEventListener('click', () => { play(snd.click); backToMenu(); });

// ── Init ──────────────────────────────────────────────────────────────
menuHighscore.textContent = `Best: ${highScore}`;
showMenu();
</script>
</body>
