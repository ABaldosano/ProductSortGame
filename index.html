<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Product Sort Game</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/global.css" />

</head>

<body>
<div id="game-wrapper">
  <div id="game-container">

    <!-- HUD (visible only during gameplay) -->
    <div id="hud">
      <div id="hearts-display" aria-label="Hearts remaining"></div>
      <div id="score-display">Score: 0</div>
      <button id="btn-pause" aria-label="Pause">⏸</button>
    </div>

    <!-- Game field -->
    <div id="game-area">
      <div id="basket-area">
        <div class="basket-zone" id="basket-Fruit" data-category="Fruit">
          <img src="assets/images/basket.png" alt="Fruit basket" />
          <span class="basket-label">Fruit</span>
        </div>
        <div class="basket-zone" id="basket-Vegetable" data-category="Vegetable">
          <img src="assets/images/basket.png" alt="Vegetable basket" />
          <span class="basket-label">Vegetable</span>
        </div>
        <div class="basket-zone" id="basket-Dairy" data-category="Dairy">
          <img src="assets/images/basket.png" alt="Dairy basket" />
          <span class="basket-label">Dairy</span>
        </div>
      </div>
    </div>

    <!-- MENU SCREEN -->
    <div class="overlay" id="screen-menu">
      <div class="menu-logo">🛒</div>
      <div class="menu-title">Product Sort<br>Simulator</div>
      <div class="menu-sub">Drag items to the correct basket.<br>Don't let them fall!</div>
      <div id="menu-highscore">Best: 0</div>
      <div class="spacer-sm"></div>
      <button class="action-btn btn-green" id="btn-start">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Start Game
      </button>
      <a class="action-btn btn-outline" href="www.arthurr.gt.tc">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        My Portfolio
      </a>
    </div>

    <!-- PAUSE SCREEN -->
    <div class="overlay hidden" id="screen-pause">
      <div class="overlay-heading">⏸ Paused</div>
      <div class="spacer-sm"></div>
      <button class="action-btn btn-green" id="btn-resume">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Resume
      </button>
      <button class="action-btn btn-blue" id="btn-menu-pause">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Main Menu
      </button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="overlay hidden" id="screen-gameover">
      <div class="overlay-heading">Game Over</div>
      <div class="overlay-stat" id="gameover-score">Score: 0</div>
      <div class="overlay-stat highlight" id="gameover-best">Best: 0</div>
      <div class="spacer-sm"></div>
      <button class="action-btn btn-green" id="btn-restart">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Play Again
      </button>
      <button class="action-btn btn-blue" id="btn-menu-gameover">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Main Menu
      </button>
    </div>

  </div>
</div>

<!-- Audio elements -->
<audio id="snd-bgm"      src="assets/sounds/Bgmusic.wav"  loop  preload="auto"></audio>
<audio id="snd-click"    src="assets/sounds/Click.wav"          preload="auto"></audio>
<audio id="snd-correct"  src="assets/sounds/Correct.wav"        preload="auto"></audio>
<audio id="snd-wrong"    src="assets/sounds/Wrong.wav"          preload="auto"></audio>
<audio id="snd-levelup"  src="assets/sounds/Levelup.wav"        preload="auto"></audio>
<audio id="snd-gameover" src="assets/sounds/Gameover.wav"       preload="auto"></audio>

<script src="assets/js/functions.js"></script>

</body>
</html>
